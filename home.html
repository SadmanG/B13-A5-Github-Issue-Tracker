<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Home</title>

    <!-- DaisyUI & TailwindCSS -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body class="bg-base-200 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto space-y-6">
        
        <!-- Header / Navbar -->
        <div class="navbar bg-base-100 rounded-box shadow-sm px-4">
            <div class="flex-1">
                <a class="text-xl font-bold flex gap-2 items-center">
                    <svg class="w-8 h-8" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.041-1.416-4.041-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"></path></svg>
                    GitHub Issues Tracker
                </a>
            </div>
            <div class="flex gap-2">
                <div class="form-control">
                    <input id="input-search" type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto h-10" />
                </div>
                <button id="btn-search" class="btn btn-primary btn-sm h-10 px-6">+ New Issue</button>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="bg-white p-6 rounded-xl flex gap-2">
            <button class="btn btn-primary bg-indigo-600 border-none text-white px-8 h-10 min-h-0">All</button>
            <button class="btn btn-ghost border border-gray-200 px-8 h-10 min-h-0">Open</button>
            <button class="btn btn-ghost border border-gray-200 px-8 h-10 min-h-0">Closed</button>
        </div>

        <!-- Dashboard Section -->
        <div class="bg-base-100 p-6 rounded-box shadow-sm">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-primary/10 text-primary rounded-full flex items-center justify-center">
                         <img src="assets/Aperture.png" alt="Aperture">
                    </div>
                    <div>
                        <h2 class="text-2xl font-bold">50 Issues</h2>
                        <p class="text-base-content/60 text-sm">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-4 text-sm font-medium">
                    <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-[#00A96E]"></span> Open</span>
                    <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-[#A855F7]"></span> Closed</span>
                </div>
            </div>

            <!-- Issues Grid -->
            <div id="card-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                
                <!-- Card Template -->
                <!-- Repeat this block for more cards -->
                
                <!-- End Card Template -->

            </div>
        </div>
    </div>
    
    <!-- Open the modal using ID.showModal() method -->
<dialog id="word_modal" class="modal modal-bottom sm:modal-middle">
    <div class="modal-box">
    <div id="details-container" class="space-y-5"></div>
      <div class="modal-action">
        <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn">Close</button>
        </form>
      </div>
    </div>
  </dialog>
<script src="scripts/home.js"></script>
</body>
</html>
