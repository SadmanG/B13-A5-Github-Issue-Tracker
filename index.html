<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- DaisyUI & TailwindCSS -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title>Github Issue Tracker | Sign-In</title>
</head>
<body>
    <div class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
  <!-- Card Container -->
  <div class="card w-full max-w-md bg-base-100 shadow-2xl rounded-lg p-8 border border-gray-100">
    
    <!-- Logo & Header -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-20 h-20 mb-4">
        <!-- GitHub Logo Placeholder -->
         <img src="assets/github-logo.png" alt="GitHub">
      </div>
      <h1 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h1>
      <p class="text-gray-500 text-sm mt-1">Sign in to manage your issues</p>
    </div>

    <!-- Form -->
    <form>
      <!-- Username Field -->
      <div class="form-control w-full mb-4">
        <label class="label">
          <span class="label-text font-semibold text-gray-700">Username</span>
        </label>
        <input id="username-input" type="text" placeholder="Enter Username" class="input input-bordered w-full focus:outline-none focus:border-primary" />
        <label class="label">
          <span class="label-text-alt text-secondary font-medium">Default: admin</span>
        </label>
      </div>

      <!-- Password Field -->
      <div class="form-control w-full mb-6">
        <label class="label">
          <span class="label-text font-semibold text-gray-700">Password</span>
        </label>
        <input id="password-input" type="password" placeholder="Enter Password" class="input input-bordered w-full focus:outline-none focus:border-primary" />
        <label class="label">
          <span class="label-text-alt text-secondary font-medium">Default: admin123</span>
        </label>
      </div>

    </form>

    <!-- Sign In Button -->
      <button id="sign-in-btn" class="btn btn-primary w-full text-lg shadow-lg mb-8">Sign In</button>

    <!-- Divider -->
    <div class="divider text-xs text-gray-400 font-light px-4">OR</div>

    <!-- Demo Credentials Footer -->
    <div class="mt-4 p-6 bg-gray-50 rounded-lg text-center border border-gray-100">
      <p class="text-xs text-gray-400 mb-3 uppercase tracking-widest">Demo Credentials:</p>
      <p class="text-gray-700 text-sm">
        <span class="font-bold">Username:</span> admin<br>
        <span class="font-bold">Password:</span> admin123
      </p>
    </div>

  </div>
</div>
<script src="scripts/login.js"></script>
</body>
</html>
