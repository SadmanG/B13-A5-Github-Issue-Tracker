<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Open</title>

    <!-- DaisyUI & TailwindCSS -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body class="bg-base-200 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto space-y-6">
        
        <!-- Header / Navbar -->
        <div class="navbar bg-base-100 rounded-box shadow-sm px-4">
            <div class="flex-1">
                <a class="text-xl font-bold flex gap-2 items-center">
                    <img src="https://i.ibb.co.com/TDkyXxWJ/github-logo.png" alt="GitHub" height="50" width="50">
                    GitHub Issues Tracker
                </a>
            </div>
            <div class="flex gap-2">
                <div class="form-control">
                    <input id="input-search" type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto h-10" />
                </div>
                <button id="btn-search" class="btn btn-primary btn-sm h-10 px-6">+ New Issue</button>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="bg-white p-6 rounded-xl flex gap-2">
            <a href="/home.html">
                <button class="btn btn-ghost border border-gray-200 px-8 h-10 min-h-0">All</button>
            </a>
            <a href="/homeOpen.html">
                <button class="btn btn-primary bg-indigo-600 border-none text-white px-8 h-10 min-h-0">Open</button>
            </a>
            <a href="/homeClosed.html">
                <button class="btn btn-ghost border border-gray-200 px-8 h-10 min-h-0">Closed</button>
            </a>            
        </div>

        <!-- Dashboard Section -->
        <div class="bg-base-100 p-6 rounded-box shadow-sm">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-primary/10 text-primary rounded-full flex items-center justify-center">
                         <img src="https://i.ibb.co.com/Cp81mzmv/Aperture.png" alt="Aperture">
                    </div>
                    <div>
                        <h2 class="text-2xl font-bold">44 Issues</h2>
                        <p class="text-base-content/60 text-sm">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-4 text-sm font-medium">
                    <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-[#00A96E]"></span> Open</span>
                    <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-[#A855F7]"></span> Closed</span>
                </div>
            </div>

            <!-- Issues Grid -->
            <div id="open-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">               
                <!-- Card Template -->
                <!-- Repeat this block for more cards -->                
                <!-- End Card Template -->
            </div>
        </div>
    </div>
    
    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
<dialog id="card_modal" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box max-w-2xl p-10">
    <div id="details-container"></div>   
  </div>
</dialog>
<script src="scripts/home.js"></script>
</body>
</html>
